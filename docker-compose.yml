services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${JOB_ARTIFACTS_HOST_PATH:-./storage/jobs}:/srv/koubei/jobs:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: ./ops/docker/web.Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: production
      BACKEND_ORIGIN: ${BACKEND_ORIGIN:-http://api:8000}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/passphrase').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./ops/docker/api.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      BASE_URL: ${BASE_URL:-http://localhost}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://koubei:koubei@postgres:5432/koubei}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/srv/koubei/jobs}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/workspace}
      WORKER_JOB_TIMEOUT_SECONDS: ${WORKER_JOB_TIMEOUT_SECONDS:-3600}
      VEHICLE_RESOLVE_CACHE_TTL_SECONDS: ${VEHICLE_RESOLVE_CACHE_TTL_SECONDS:-604800}
      VEHICLE_RESOLVE_PLATFORM_TIMEOUT_SECONDS: ${VEHICLE_RESOLVE_PLATFORM_TIMEOUT_SECONDS:-60}
      JOB_ARTIFACT_RETENTION_DAYS: ${JOB_ARTIFACT_RETENTION_DAYS:-3}
      JOB_ARTIFACT_CLEANUP_INTERVAL_SECONDS: ${JOB_ARTIFACT_CLEANUP_INTERVAL_SECONDS:-43200}
      PASS_PHRASE_HASH: ${PASS_PHRASE_HASH:-}
      PASS_PHRASE_VERSION: ${PASS_PHRASE_VERSION:-2026-W17}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL_REPORT: ${LLM_MODEL_REPORT:-}
      LLM_MODEL_QA: ${LLM_MODEL_QA:-}
    volumes:
      - ${JOB_ARTIFACTS_HOST_PATH:-./storage/jobs}:/srv/koubei/jobs
      - ..:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\""]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: ./ops/docker/worker.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://koubei:koubei@postgres:5432/koubei}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ARTIFACT_ROOT: ${ARTIFACT_ROOT:-/srv/koubei/jobs}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/workspace}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME:-vehicle-koubei}
      JOB_ARTIFACT_RETENTION_DAYS: ${JOB_ARTIFACT_RETENTION_DAYS:-3}
      JOB_ARTIFACT_CLEANUP_INTERVAL_SECONDS: ${JOB_ARTIFACT_CLEANUP_INTERVAL_SECONDS:-43200}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL_REPORT: ${LLM_MODEL_REPORT:-}
      LLM_MODEL_QA: ${LLM_MODEL_QA:-}
      OPENCLAW_ADAPTER_ENABLED: ${OPENCLAW_ADAPTER_ENABLED:-false}
      OPENCLAW_ADAPTER_STAGES: ${OPENCLAW_ADAPTER_STAGES:-collecting_autohome,collecting_dcd}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-ws://host.docker.internal:18790}
      OPENCLAW_GATEWAY_TOKEN_FILE: ${OPENCLAW_GATEWAY_TOKEN_FILE:-/run/secrets/openclaw_gateway_token}
      OPENCLAW_AGENT_ID: ${OPENCLAW_AGENT_ID:-main}
      OPENCLAW_AUTOHOME_AGENT_ID: ${OPENCLAW_AUTOHOME_AGENT_ID:-autohome}
      OPENCLAW_DCD_AGENT_ID: ${OPENCLAW_DCD_AGENT_ID:-dongchedi}
      OPENCLAW_TIMEOUT_SECONDS: ${OPENCLAW_TIMEOUT_SECONDS:-1800}
      OPENCLAW_ARTIFACT_POLL_INTERVAL_SECONDS: ${OPENCLAW_ARTIFACT_POLL_INTERVAL_SECONDS:-5}
      OPENCLAW_COLLECTOR_SKILL: ${OPENCLAW_COLLECTOR_SKILL:-sh3rlockC/auto-koubei-collector}
      OPENCLAW_AUTOHOME_COLLECTOR_SKILL: ${OPENCLAW_AUTOHOME_COLLECTOR_SKILL:-sh3rlockC/auto-koubei-collector}
      OPENCLAW_DCD_COLLECTOR_SKILL: ${OPENCLAW_DCD_COLLECTOR_SKILL:-sh3rlockC/dcd-koubei-collector}
      OPENCLAW_ARTIFACT_ROOT_HOST: ${OPENCLAW_ARTIFACT_ROOT_HOST:-}
      OPENCLAW_TASK_DB_PATH: ${OPENCLAW_TASK_DB_PATH:-/openclaw-state/tasks/runs.sqlite}
      WORDCLOUD_FONT_PATH: ${WORDCLOUD_FONT_PATH:-/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc}
    volumes:
      - ${JOB_ARTIFACTS_HOST_PATH:-./storage/jobs}:/srv/koubei/jobs
      - ..:/workspace:ro
      - ${OPENCLAW_STATE_HOST_PATH:-./ops/openclaw-state-placeholder}:/openclaw-state:ro
    secrets:
      - openclaw_gateway_token
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; from redis import Redis; Redis.from_url(os.environ['REDIS_URL']).ping()\""]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koubei}
      POSTGRES_USER: ${POSTGRES_USER:-koubei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koubei}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koubei} -d ${POSTGRES_DB:-koubei}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

secrets:
  openclaw_gateway_token:
    file: ${OPENCLAW_GATEWAY_TOKEN_FILE_HOST:-./ops/secrets/openclaw_gateway_token.placeholder}
