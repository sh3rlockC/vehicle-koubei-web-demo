limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $api_upstream api:8000;
    set $web_upstream web:3000;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = / {
        return 308 /car-user-feedback/;
    }

    location ~ ^/(passphrase|vehicle|candidates|progress|result)/?$ {
        return 308 /car-user-feedback$request_uri;
    }

    location = /car-user-feedback {
        return 308 /car-user-feedback/;
    }

    location = /car-user-feedback/ {
        return 308 /car-user-feedback/passphrase;
    }

    location ~ ^/car-user-feedback/api/jobs/[^/]+/progress/?$ {
        rewrite ^/car-user-feedback(/api/.*)$ $1 break;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$api_upstream;
    }

    location /car-user-feedback/api/ {
        rewrite ^/car-user-feedback(/api/.*)$ $1 break;
        limit_req zone=api_limit burst=20 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$api_upstream;
    }

    location /car-user-feedback/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$web_upstream;
    }

    # Progress polling runs every few seconds and must not consume the general API quota.
    location ~ ^/api/jobs/[^/]+/progress/?$ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$api_upstream;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$api_upstream;
    }

    location /artifacts/ {
        alias /srv/koubei/jobs/;
        autoindex off;
        add_header Cache-Control "private, max-age=300";
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://$web_upstream;
    }
}
